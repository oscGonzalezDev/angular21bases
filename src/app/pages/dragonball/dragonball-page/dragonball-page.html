<h2>dragonball</h2>
<img src="https://hips.hearstapps.com/hmg-prod/images/dragon-ball-1662030426.jpg?crop=1xw:1xh;0,0.0464xh" width="500" alt="Dragonball">

<hr>

<section class="row">
    <div class="col-12 col-sm-6">
        <h3>Agregar: {{ dbName() }}</h3>
        <input type="text" class="form-control"
        placeholder="Nombre"
        [value]="dbName()"
        (change)="dbName.set(txtName.value)"
        (input)="dbName.set(txtName.value)" #txtName >
        <!-- #txtName es una referencia local txtName.value referencia el valor de si mismo -->
        <!-- (change) e (input)Son para eventos en el input, cuando se cumple el evento se setea el valor de dbName -->
        <!-- value [value]="dbName()" es el que toma el valor de change -->

        <h4>Poder: {{ dbPower() }}</h4>
        <input type="number" class="form-control mt-2" placeholder="Poder"
        [value]="dbPower()"
        (change)="dbPower.set(+numPower.value)"
        (input)="dbPower.set(+numPower.value)" #numPower>
        <!-- El +numPower.value es para parsear el número a letra --> 

        <!-- Add button -->
        <button class="mt-2 btn btn-primary" (click)="addChar()">Agregar</button>
    </div>

    <div class="col-12 col-sm-6">
        <h3>Listado</h3>
        <ul>
            <!-- Directivas for y if -->
            @for (char of characters(); let idx = $index; track char.id) {
                @if(char.power > 500){
                    <li>
                        <span>{{idx + 1}} - {{char.name}}</span> 
                        <!-- Estilos condicionales -->
                        <strong
                            [class.text-danger]="char.power >= 9000"
                            [class.text-primary]="char.power < 9000">
                            ({{char.power}})
                        </strong>
                    </li>
                }
            }
        </ul>
    </div>
</section>
